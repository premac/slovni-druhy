<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
    <title>Slovní druhy</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
        }

        /* ── Phone wrapper ─────────────────── */
        #phone {
            width: min(100vw, 393px);
            height: min(100vh, 852px);
            background: #000;
            position: relative;
            overflow: hidden;
            border-radius: 54px;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow:
                0 0 0 3px rgba(255,255,255,0.06),
                0 40px 100px rgba(0,0,0,0.85),
                inset 0 0 0 1px rgba(0,0,0,0.6);
        }

        /* ── Shared: status bar ─────────────── */
        .status-bar {
            width: 100%;
            padding: 14px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .status-icons { display: flex; gap: 6px; align-items: center; font-size: 12px; }

        /* Battery score indicator */
        #battery-wrap {
            display: flex;
            align-items: center;
            gap: 0;
        }
        #battery-pct {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            min-width: 26px;
            text-align: right;
            margin-right: 4px;
        }
        #battery-outer {
            width: 36px;
            height: 17px;
            border: 1.5px solid rgba(255,255,255,0.7);
            border-radius: 4px;
            padding: 2px;
            position: relative;
        }
        #battery-nub {
            width: 3px;
            height: 7px;
            background: rgba(255,255,255,0.6);
            border-radius: 0 2px 2px 0;
        }
        #battery-fill {
            height: 100%;
            border-radius: 2px;
            background: #30d158;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.4s;
        }

        /* ═══════════════════════════════════════
           GAME SCREEN
           ═══════════════════════════════════════ */
        #game-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, #1c1c1e 0%, #000 100%);
        }

        /* Sentence area */
        #sentence-area {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 14px 4px;
            gap: 12px;
            min-height: 0;
        }
        #task-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }
        #words-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2px 10px;
            justify-content: center;
            align-items: flex-end;
        }
        .word-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .word-chip {
            font-size: 20px;
            font-weight: 500;
            color: rgba(255,255,255,0.28);
            transition: color 0.2s ease, font-size 0.22s cubic-bezier(0.34,1.56,0.64,1);
            line-height: 1.3;
            padding: 0 1px;
        }
        .word-chip.active {
            color: #fff;
            font-size: 26px;
        }
        .word-chip.entered {
            color: #fff;
        }
        .word-chip.correct {
            color: rgba(255,255,255,0.28);
        }
        .word-chip.wrong {
            color: #ff453a;
        }
        .word-type-badge {
            font-size: 9.5px;
            font-weight: 700;
            height: 13px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
            letter-spacing: 0.2px;
        }
        .word-type-badge.on  { opacity: 1; }
        .word-type-badge.dim { opacity: 1; color: rgba(255,255,255,0.28); }
        .word-type-badge.err { opacity: 1; color: #ff453a; }

        /* PIN dots */
        #pin-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 2px 0;
        }
        .pin-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.35);
            background: transparent;
            transition: all 0.15s;
        }
        .pin-dot.on { background: #fff; border-color: #fff; }

        /* Numpad */
        #numpad-area {
            width: 100%;
            padding: 4px 22px 30px;
            flex-shrink: 0;
        }
        #numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 330px;
            margin: 0 auto;
        }
        .key-btn {
            aspect-ratio: 1;
            max-height: 76px;
            border-radius: 50%;
            background: rgba(255,255,255,0.11);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-family: inherit;
            transition: background 0.08s;
        }
        .key-btn:active { background: rgba(255,255,255,0.28); }
        .key-btn.ghost { background: transparent; pointer-events: none; }
        .key-btn.del  { background: transparent; font-size: 22px; }
        .key-btn.del:active { background: rgba(255,255,255,0.12); }
        .key-digit { font-size: 28px; font-weight: 300; line-height: 1.1; }
        .key-label {
            font-size: 7px;
            color: rgba(255,255,255,0.42);
            letter-spacing: 0.3px;
            text-transform: uppercase;
            text-align: center;
            max-width: 62px;
            line-height: 1.1;
        }

        /* Score corner removed — battery in status bar is used instead */

        /* ── Fullscreen button (desktop only) ── */
        #fs-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.45);
            border-radius: 9px;
            padding: 7px 11px;
            font-size: 15px;
            cursor: pointer;
            z-index: 999;
            transition: background 0.15s, color 0.15s;
            line-height: 1;
            font-family: inherit;
        }
        #fs-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

        /* ── Mobile: no phone frame, fill screen ── */
        @media (max-width: 480px) {
            #fs-btn { display: none; }
            #phone {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
                max-width: none;
                max-height: none;
            }
            .status-bar {
                padding-top: max(14px, env(safe-area-inset-top));
            }
            #numpad-area {
                padding-bottom: max(30px, env(safe-area-inset-bottom, 30px));
            }
        }

        /* ── PWA standalone / fullscreen ── */
        @media (display-mode: standalone), (display-mode: fullscreen) {
            #fs-btn { display: none; }
            body { background: #000; }
            #phone {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                border-radius: 0;
                border: none;
                box-shadow: none;
                max-width: none;
                max-height: none;
            }
            .status-bar {
                padding-top: max(14px, env(safe-area-inset-top));
            }
            #numpad-area {
                padding-bottom: max(30px, env(safe-area-inset-bottom, 30px));
            }
        }

        /* Type colors */
        .c0 { color: #8E8E93; } .c1 { color: #5AC8FA; } .c2 { color: #4CD964; }
        .c3 { color: #AF52DE; } .c4 { color: #FF9500; } .c5 { color: #FF3B30; }
        .c6 { color: #34AADC; } .c7 { color: #FF2D55; } .c8 { color: #FFCC00; }
        .c9 { color: #007AFF; }

        /* ═══════════════════════════════════════
           SUCCESS SCREEN (fake iPhone home)
           ═══════════════════════════════════════ */
        #success-screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            z-index: 100;
        }
        #success-screen.on { display: flex; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity:0; transform: scale(1.03); } to { opacity:1; transform: scale(1); } }

        #success-bg {
            position: absolute;
            inset: 0;
        }
        .bg-glow {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 220px;
            opacity: 0.10;
            line-height: 1;
            z-index: 0;
        }
        #success-inner {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #s-status {
            padding: 14px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
        }
        #s-time {
            font-size: 88px;
            font-weight: 100;
            color: #fff;
            text-align: center;
            letter-spacing: -4px;
            line-height: 1;
            margin-top: 6px;
        }
        #s-date {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-top: 2px;
        }
        #s-badge {
            margin: 14px auto 0;
            background: rgba(48,209,88,0.22);
            border: 1.5px solid #30d158;
            color: #30d158;
            font-size: 13px;
            font-weight: 700;
            padding: 7px 22px;
            border-radius: 20px;
            letter-spacing: 0.8px;
            display: inline-block;
        }
        #s-tap-hint {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 13px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            animation: pulse 1.8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 0.35; }
            50%      { opacity: 0.75; }
        }
        #s-swipe-bar {
            width: 134px;
            height: 5px;
            border-radius: 3px;
            background: rgba(255,255,255,0.35);
            margin: 6px auto 20px;
        }
        .flex1 { flex: 1; }
        #app-grid {
            padding: 0 22px 14px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .app-icon { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .app-bubble {
            width: 58px;
            height: 58px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .app-name { font-size: 10px; color: rgba(255,255,255,0.78); text-align: center; }
        #s-dock {
            margin: 0 14px 28px;
            background: rgba(255,255,255,0.11);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 11px 24px;
            display: flex;
            justify-content: space-around;
        }
        .dock-e { font-size: 36px; }

        /* ═══════════════════════════════════════
           EASTER EGG
           ═══════════════════════════════════════ */
        #easter-egg {
            position: absolute;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 500;
            padding: max(44px, env(safe-area-inset-top)) 24px max(28px, env(safe-area-inset-bottom));
            cursor: pointer;
        }
        #easter-egg.on { display: flex; animation: fadeIn 0.5s ease; }

        #ee-classroom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }
        #ee-board {
            width: 240px;
            height: 116px;
            background: #1a5c2a;
            border: 6px solid #7a5530;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 24px rgba(0,0,0,0.45), 0 6px 18px rgba(0,0,0,0.6);
        }
        #ee-chalk {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: 'Caveat', 'Segoe Script', 'Brush Script MT', cursive;
            color: rgba(255,255,255,0.85);
        }
        #ee-chalk-title {
            font-size: 28px;
            letter-spacing: 2px;
        }
        #ee-chalk-sub {
            font-size: 16px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.65);
        }
        #ee-teacher {
            font-size: 58px;
            line-height: 1;
            margin-top: -2px;
        }
        #ee-rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 18px;
        }
        .ee-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            font-size: 36px;
            line-height: 1;
        }
        .ee-row span {
            display: inline-block;
            animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes popIn {
            from { opacity:0; transform: scale(0.3); }
            to   { opacity:1; transform: scale(1); }
        }
        #ee-footer {
            font-size: 12px;
            color: rgba(255,255,255,0.28);
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* ═══════════════════════════════════════
           GAME OVER SCREEN
           ═══════════════════════════════════════ */
        #gameover-screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #1c1c1e 0%, #000 100%);
            z-index: 200;
        }
        #gameover-screen.on { display: flex; animation: fadeIn 0.4s ease; }
        #go-emoji { font-size: 72px; margin-bottom: 20px; }
        .pct-row { display: flex; align-items: flex-end; gap: 4px; }
        #pct-num { font-size: 100px; font-weight: 200; color: #fff; line-height: 1; }
        #pct-sign { font-size: 44px; font-weight: 200; color: rgba(255,255,255,0.55); padding-bottom: 8px; }
        #go-label { font-size: 18px; color: rgba(255,255,255,0.45); margin-top: 6px; margin-bottom: 28px; }
        #go-stats { font-size: 16px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.8; }
        .hl { color: #30d158; font-weight: 700; }
        #play-again {
            margin-top: 44px;
            padding: 15px 52px;
            background: #007AFF;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        #play-again:active { background: #0060cc; transform: scale(0.97); }
    </style>
</head>
<body>
<div id="phone">

    <!-- ════ GAME SCREEN ════ -->
    <div id="game-screen">
        <div class="status-bar">
            <span id="g-clock">9:41</span>
            <div id="battery-wrap">
                <span id="battery-pct">0%</span>
                <div id="battery-outer"><div id="battery-fill"></div></div>
                <div id="battery-nub"></div>
            </div>
        </div>
        <div id="sentence-area">
            <div id="task-label">Urči slovní druh každého slova</div>
            <div id="words-container"></div>
            <div id="pin-row"></div>
        </div>
        <div id="numpad-area">
            <div id="numpad-grid"></div>
        </div>
    </div>

    <!-- ════ SUCCESS SCREEN ════ -->
    <div id="success-screen">
        <div id="success-bg"></div>
        <div class="bg-glow" id="bg-glow"></div>
        <div id="success-inner">
            <div id="s-status">
                <span id="ss-clock">9:41</span>
                <div style="display:flex;gap:6px;font-size:12px"><span>●●●</span><span>🔋</span></div>
            </div>
            <div id="s-time">9:41</div>
            <div id="s-date"></div>
            <div style="text-align:center"><div id="s-badge">✓ SPRÁVNĚ!</div></div>
            <div class="flex1"></div>
            <div id="app-grid"></div>
            <div id="s-dock">
                <span class="dock-e">📱</span>
                <span class="dock-e">📧</span>
                <span class="dock-e">🗺️</span>
                <span class="dock-e">📷</span>
            </div>
            <div id="s-tap-hint">klepni pro pokračování</div>
            <div id="s-swipe-bar"></div>
        </div>
    </div>

    <!-- Fullscreen button (desktop) -->
    <button id="fs-btn" title="Celá obrazovka" onclick="toggleFS()">⛶</button>

    <!-- ════ EASTER EGG ════ -->
    <div id="easter-egg">
        <div id="ee-classroom">
            <div id="ee-board">
                <div id="ee-chalk">
                    <div id="ee-chalk-title">Eduard</div>
                    <div id="ee-chalk-sub">3. třída</div>
                </div>
            </div>
            <div id="ee-teacher">👩‍🦰</div>
            <div id="ee-rows"></div>
        </div>
        <div id="ee-footer">vytvořila Terezka s tátou</div>
    </div>

    <!-- ════ GAME OVER SCREEN ════ -->
    <div id="gameover-screen">
        <div id="go-emoji"></div>
        <div class="pct-row">
            <div id="pct-num">0</div>
            <div id="pct-sign">%</div>
        </div>
        <div id="go-label">úspěšnost</div>
        <div id="go-stats"></div>
        <button id="play-again" onclick="startGame()">Hrát znovu</button>
    </div>

</div>
<script>

// DATA

// AUDIO
// ═══════════════════════════════════════
let _ctx = null;
function audioCtx() {
    if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
    return _ctx;
}

function playUnlock() {
    const ctx = audioCtx();
    // Two-note ascending chime (iPhone-style)
    [[880, 0, 0.09], [1318.5, 0.10, 0.18]].forEach(([f, delay, dur]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(f, ctx.currentTime);
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.28, t + 0.015);
        gain.gain.setValueAtTime(0.28, t + dur * 0.55);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.05);
    });
}

function playLock() {
    const ctx = audioCtx();
    // Short mechanical click (iPhone lock style)
    [[900, 0,    0.018],
     [420, 0.01, 0.04 ]].forEach(([f, delay, dur]) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'square';
        osc.frequency.setValueAtTime(f, ctx.currentTime);
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.02);
    });
}

function playKeyClick() {
    const ctx = audioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1100, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(550, ctx.currentTime + 0.018);
    gain.gain.setValueAtTime(0.10, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.022);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.025);
}

function playSqueak() {
    const ctx = audioCtx();
    // Sawtooth sweep up-then-down like a squeaky floorboard / door hinge
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(280, t);
    osc.frequency.exponentialRampToValueAtTime(980, t + 0.07);
    osc.frequency.exponentialRampToValueAtTime(380, t + 0.16);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.14, t + 0.015);
    gain.gain.setValueAtTime(0.14, t + 0.10);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
    osc.start(t); osc.stop(t + 0.22);
}

function playDeleteClick() {
    const ctx = audioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(320, t);
    osc.frequency.exponentialRampToValueAtTime(160, t + 0.04);
    gain.gain.setValueAtTime(0.22, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    osc.start(t); osc.stop(t + 0.06);
}

function haptic(ms) {
    if (navigator.vibrate) navigator.vibrate(ms || 8);
}

// DOM HELPERS
// ═══════════════════════════════════════
const $  = id => document.getElementById(id);
const gs = $("game-screen"), ss = $("success-screen"), go = $("gameover-screen");

// ═══════════════════════════════════════
// BUILD NUMPAD (once)
// ═══════════════════════════════════════
function buildNumpad() {
    const grid = $("numpad-grid");
    grid.innerHTML = '';
    NUMPAD.forEach(key => {
        const btn = document.createElement('button');
        if (!key.d) {
            btn.className = 'key-btn ghost';
        } else if (key.d === 'DEL') {
            btn.className = 'key-btn del';
            btn.textContent = '⌫';
            btn.addEventListener('pointerdown', e => { e.preventDefault(); del(); });
        } else {
            btn.className = 'key-btn';
            btn.innerHTML = `<span class="key-digit">${key.d}</span><span class="key-label">${key.l}</span>`;
            const n = parseInt(key.d);
            btn.addEventListener('pointerdown', e => { e.preventDefault(); press(n); });
        }
        grid.appendChild(btn);
    });
}

// ═══════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════
function tick() {
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const days=["neděle","pondělí","úterý","středa","čtvrtek","pátek","sobota"];
    const months=["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
    const dt = `${days[now.getDay()]}, ${now.getDate()}. ${months[now.getMonth()]}`;
    $("g-clock").textContent = t;
    $("ss-clock").textContent = t;
    $("s-time").textContent = t;
    $("s-date").textContent = dt;
}

// ═══════════════════════════════════════
// BATTERY
// ═══════════════════════════════════════
function updateBattery() {
    const pct = Math.min(numCorrect / 20 * 100, 100);
    $("battery-fill").style.width = pct + '%';
    $("battery-pct").textContent = Math.round(pct) + '%';
    const color = pct >= 100 ? '#FFD700'
                : pct >= 60  ? '#30d158'
                : pct >= 30  ? '#FF9500'
                : '#FF453A';
    $("battery-fill").style.background = color;
}

// ═══════════════════════════════════════
// START / LOAD
// ═══════════════════════════════════════
function startGame() {
    deck = [...SENTENCES].sort(() => Math.random() - 0.5);
    curIdx = 0; numCorrect = 0; numTotal = 0; busy = false;
    clearWrongTimeout();
    ss.classList.remove('on');
    go.classList.remove('on');
    gs.style.display = 'flex';
    updateBattery();
    loadSentence();
}

function loadSentence() {
    if (curIdx >= deck.length) { endGame(); return; }
    entered = [];
    busy = false;
    const s = deck[curIdx];
    const n = s.w.length;

    // words
    const wc = $("words-container");
    wc.innerHTML = '';
    s.w.forEach((word, i) => {
        const box = document.createElement('div');
        box.className = 'word-box';
        const chip = document.createElement('div');
        chip.id = `ch${i}`;
        chip.className = 'word-chip' + (i===0?' active':'');
        chip.textContent = word;
        const badge = document.createElement('div');
        badge.id = `bd${i}`;
        badge.className = 'word-type-badge';
        box.appendChild(chip); box.appendChild(badge);
        wc.appendChild(box);
    });

    // pin dots
    const pr = $("pin-row");
    pr.innerHTML = '';
    for (let i=0;i<n;i++) {
        const d = document.createElement('div');
        d.id = `pd${i}`; d.className = 'pin-dot';
        pr.appendChild(d);
    }
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
function press(digit) {
    ensureFullscreen();
    if (busy) return;
    const s = deck[curIdx];
    if (entered.length >= s.w.length) return;
    playKeyClick(); haptic(8);

    const pos = entered.length;
    entered.push(digit);

    const chip = $(`ch${pos}`);
    chip.classList.remove('active');
    chip.classList.add('entered');

    const badge = $(`bd${pos}`);
    badge.textContent = TYPE_SHORT[digit];
    badge.className = `word-type-badge on c${digit}`;

    $(`pd${pos}`).classList.add('on');

    if (entered.length === s.w.length) {
        busy = true;
        setTimeout(() => entered.join('') === '000008' ? showEasterEgg() : check(), 220);
    } else {
        $(`ch${entered.length}`).classList.add('active');
    }
}

function del() {
    if (busy || entered.length === 0) return;
    playDeleteClick(); haptic(14);
    const pos = entered.length - 1;
    entered.pop();

    const next = $(`ch${pos+1}`);
    if (next) next.classList.remove('active');

    const chip = $(`ch${pos}`);
    chip.classList.remove('entered');
    chip.classList.add('active');

    const badge = $(`bd${pos}`);
    badge.className = 'word-type-badge';
    badge.textContent = '';

    $(`pd${pos}`).classList.remove('on');
}

// ═══════════════════════════════════════
// CHECK
// ═══════════════════════════════════════
function clearWrongTimeout() {
    if (wrongTimer) { clearTimeout(wrongTimer); wrongTimer = null; }
    if (wrongTapHandler) {
        gs.removeEventListener('pointerdown', wrongTapHandler);
        document.removeEventListener('keydown', wrongTapHandler);
        wrongTapHandler = null;
    }
}

function check() {
    const s = deck[curIdx];
    let ok = true;
    s.t.forEach((type, i) => {
        const chip = $(`ch${i}`);
        const badge = $(`bd${i}`);
        if (entered[i] === type) {
            chip.classList.add('correct');
            badge.className = 'word-type-badge dim';
        } else {
            chip.classList.add('wrong');
            badge.textContent = `${entered[i]}→${type}`;
            badge.className = `word-type-badge on c${type}`;
            ok = false;
        }
    });

    numTotal++;
    if (ok) {
        numCorrect++;
        updateBattery();
        setTimeout(() => showSuccess(s), 350);
    } else {
        const wrongCount = entered.filter((v, i) => v !== s.t[i]).length;
        for (let i = 0; i < wrongCount; i++) {
            setTimeout(() => { playSqueak(); haptic(35); }, i * 280);
        }
        // Show correct answer for up to 30s or until user taps
        const doAdvance = () => {
            clearWrongTimeout();
            advance();
        };
        wrongTapHandler = doAdvance;
        gs.addEventListener('pointerdown', wrongTapHandler, { once: true });
        document.addEventListener('keydown', wrongTapHandler, { once: true });
        wrongTimer = setTimeout(doAdvance, 30000);
    }
}

// ═══════════════════════════════════════
// SUCCESS SCREEN
// ═══════════════════════════════════════
let successDismissHandler = null;

function dismissSuccess() {
    if (!successDismissHandler) return;
    // Clean up listeners
    ss.removeEventListener('pointerdown', successDismissHandler);
    document.removeEventListener('keydown', successDismissHandler);
    successDismissHandler = null;

    playLock();

    // Brief delay for lock sound, then transition
    setTimeout(() => {
        ss.classList.remove('on');
        if (numCorrect >= 20) { endGame(); } else { advance(); }
    }, 120);
}

function showSuccess(s) {
    const [c1, c2] = s.bg.split(',');
    $("success-bg").style.background = `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
    $("bg-glow").textContent = s.e;

    const appNames = ["Safari","Mail","Mapy","Hudba","Hodiny","Fotky","Nastavení","Zprávy"];
    const grid = $("app-grid");
    grid.innerHTML = '';
    s.apps.forEach((em, i) => {
        const icon = document.createElement('div');
        icon.className = 'app-icon';
        icon.innerHTML = `<div class="app-bubble">${em}</div><div class="app-name">${appNames[i]||''}</div>`;
        grid.appendChild(icon);
    });

    tick();
    ss.classList.add('on');
    playUnlock();

    // Wait for user to tap or press any key
    // Small delay so the unlock sound can finish before we register the handler
    setTimeout(() => {
        successDismissHandler = dismissSuccess;
        ss.addEventListener('pointerdown', successDismissHandler, { once: true });
        document.addEventListener('keydown', successDismissHandler, { once: true });
    }, 350);
}

// ═══════════════════════════════════════
// ADVANCE / END
// ═══════════════════════════════════════
function advance() {
    curIdx++;
    if (curIdx >= deck.length) { endGame(); } else { loadSentence(); }
}

function endGame() {
    const pct = numTotal > 0 ? Math.round(numCorrect / numTotal * 100) : 0;
    $("go-emoji").textContent = pct >= 80 ? '🏆' : pct >= 50 ? '📚' : '💪';
    $("go-stats").innerHTML = `Správně: <span class="hl">${numCorrect}</span> z ${numTotal} vět`;

    let cur = 0;
    const timer = setInterval(() => {
        cur = Math.min(cur + Math.max(1, Math.ceil((pct - cur) / 8)), pct);
        $("pct-num").textContent = cur;
        if (cur >= pct) clearInterval(timer);
    }, 35);

    ss.classList.remove('on');
    go.classList.add('on');
}

// ═══════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') press(parseInt(e.key));
    if (e.key === 'Backspace') del();
});

// ═══════════════════════════════════════
// EASTER EGG
// ═══════════════════════════════════════
function showEasterEgg() {
    // Žluté postavičky, náhodné pohlaví 50:50
    const kids = Array.from({ length: 16 }, () => Math.random() < 0.5 ? '👧' : '👦');

    const rows = $('ee-rows');
    rows.innerHTML = '';
    for (let r = 0; r < 4; r++) {
        const row = document.createElement('div');
        row.className = 'ee-row';
        for (let c = 0; c < 4; c++) {
            const span = document.createElement('span');
            span.textContent = kids[r * 4 + c];
            span.style.animationDelay = (0.25 + (r * 4 + c) * 0.055) + 's';
            row.appendChild(span);
        }
        rows.appendChild(row);
    }

    playUnlock();
    $('easter-egg').classList.add('on');
    $('easter-egg').addEventListener('pointerdown', hideEasterEgg, { once: true });
    document.addEventListener('keydown', hideEasterEgg, { once: true });
}
function hideEasterEgg() {
    playLock();
    $('easter-egg').classList.remove('on');
    // Reset current sentence so player can try again
    loadSentence();
}

// ═══════════════════════════════════════
// FULLSCREEN
// ═══════════════════════════════════════
const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.userAgentData?.mobile === true);

let _fsTriggered = false;
function ensureFullscreen() {
    if (!isMobileDevice || _fsTriggered || document.fullscreenElement) return;
    _fsTriggered = true;
    document.documentElement.requestFullscreen().catch(() => { _fsTriggered = false; });
}

function toggleFS() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen();
    }
}
document.addEventListener('fullscreenchange', () => {
    const btn = $('fs-btn');
    if (btn) btn.style.display = document.fullscreenElement ? 'none' : '';
    if (document.fullscreenElement) _fsTriggered = true;
});

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
buildNumpad();
tick();
setInterval(tick, 15000);
startGame();
</script>
